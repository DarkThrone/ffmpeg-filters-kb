{% extends "base.html" %}

{% block title %}{{ term.name | title }}{% endblock title %}

{% block content %}
<h1>{{ term.name | title }}</h1>
<div class="filter-grid">
{% for page in term.pages %}
  <a href="{{ page.permalink }}" class="filter-card">
    <div class="filter-card-header">
      <span class="filter-card-name">{{ page.title }}</span>
      <span class="badge badge-{{ page.extra.filter_type | default(value='video') }}">{{ page.extra.filter_type | default(value="video") }}</span>
    </div>
    <p class="filter-card-desc">{{ page.description }}</p>
  </a>
{% endfor %}
</div>
{% endblock content %}
